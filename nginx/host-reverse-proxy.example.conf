# Ejemplo: nginx en el HOST delante de docker compose.
# Copiar a sites-enabled (p. ej. /etc/nginx/sites-enabled/nest) y ajustar:
#   - server_name → tu dominio
#   - 127.0.0.1:PUERTO → mismo valor que WEB_PORT en .env
#
# sudo nginx -t && sudo systemctl reload nginx

upstream nest_docker_nginx {
    server 127.0.0.1:18080;
    keepalive 16;
}

server {
    listen 80;
    server_name nest.example.com;

    client_max_body_size 50M;

    access_log /var/log/nginx/nest_access.log;
    error_log /var/log/nginx/nest_error.log;

    # SSE (EventSource /api/events) — desactivar buffering en el proxy del host
    location /api/events {
        proxy_pass http://nest_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Terminal: stream GET .../terminals/{id}/events (fetch) — sin buffering
    location ~ ^/api/sessions/[^/]+/terminals/[^/]+/events {
        proxy_pass http://nest_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /ws/ {
        proxy_pass http://nest_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://nest_docker_nginx;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
